reminder_text:
  type: string
  default: "Don't forget, this isn't public yet!"
  description: "Bold reminder text shown above the topic timer. Leave empty to hide."

display_location:
  type: enum
  default: "Both"
  choices:
    - Top
    - Bottom
    - Both
  description: "Where should the topic timer appear?"

enabled_categories:
  type: list
  list_type: category
  default: ""
  description: "Choose categories where the topic timer location will be modified. Leave empty to apply to all categories."

